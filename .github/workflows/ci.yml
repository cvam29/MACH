name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-dotnet:
    name: Build & test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect .NET changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dotnet:
              - 'src/**'
              - 'tests/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'Mach.sln'
              - '.github/workflows/ci.yml'

      - name: Setup .NET
        if: steps.filter.outputs.dotnet == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        if: steps.filter.outputs.dotnet == 'true'
        run: dotnet restore Mach.sln

      - name: Build (warnings as errors)
        if: steps.filter.outputs.dotnet == 'true'
        run: dotnet build Mach.sln --no-restore --configuration Release -warnaserror

      - name: Test
        if: steps.filter.outputs.dotnet == 'true'
        run: dotnet test Mach.sln --no-build --configuration Release --verbosity normal

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Terraform
        id: tf
        run: |
          if [ -d "infra/terraform" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "infra/terraform not present yet — skipping."
          fi

      - name: Setup Terraform
        if: steps.tf.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        if: steps.tf.outputs.exists == 'true'
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Terraform init (no backend)
        if: steps.tf.outputs.exists == 'true'
        run: terraform init -backend=false
        working-directory: infra/terraform/environments/dev

      - name: Terraform validate
        if: steps.tf.outputs.exists == 'true'
        run: terraform validate
        working-directory: infra/terraform/environments/dev

  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for storefront
        id: fe
        run: |
          if [ -d "apps/storefront" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "apps/storefront not present yet — skipping."
          fi

      - name: Setup Node
        if: steps.fe.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/storefront/package-lock.json

      - name: Install
        if: steps.fe.outputs.exists == 'true'
        run: npm ci
        working-directory: apps/storefront

      - name: Lint
        if: steps.fe.outputs.exists == 'true'
        run: npm run lint --if-present
        working-directory: apps/storefront

      - name: Type-check
        if: steps.fe.outputs.exists == 'true'
        run: npm run typecheck --if-present
        working-directory: apps/storefront
