# Local development dependencies for the MACH demo.
#
# Brings up three containers:
#   - azurite          Azure Storage emulator (AzureWebJobsStorage for all Function hosts)
#   - mssql            SQL Server 2022 — backs the Service Bus emulator AND hosts the app database (MachDb)
#   - servicebus       Azure Service Bus emulator (topics/subscriptions from ./local/servicebus/config.json)
#
# Start with `./run.ps1` (preferred — it also runs migrations and launches the hosts) or directly:
#   $env:ACCEPT_EULA = "Y"; docker compose up -d
#
# ACCEPT_EULA=Y acknowledges the Microsoft Software License Terms for the Service Bus emulator
# and SQL Server Linux. See docs/run-local.md.
name: mach-local

services:
  azurite:
    container_name: mach-azurite
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    networks:
      - mach

  mssql:
    container_name: mach-mssql
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "${ACCEPT_EULA:-N}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Mach_local_Dev123!}"
    networks:
      mach:
        aliases:
          - mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  servicebus:
    container_name: mach-servicebus
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    pull_policy: always
    volumes:
      - "./local/servicebus/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"        # AMQP
      - "5300:5300"        # management / health
    environment:
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Mach_local_Dev123!}"
      ACCEPT_EULA: "${ACCEPT_EULA:-N}"
      EMULATOR_HTTP_PORT: 5300
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      mach:
        aliases:
          - sb-emulator

networks:
  mach:
